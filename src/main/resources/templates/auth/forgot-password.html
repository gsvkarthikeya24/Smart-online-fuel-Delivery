<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Smart Online Fuel Delivery</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #090d16 0%, #111827 50%, #4f46e5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            margin: 0;
            color: #ffffff;
        }

        .recovery-card {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.6s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-control-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 16px 12px 42px;
            color: #ffffff;
            transition: all 0.3s ease;
        }

        .form-control-glass:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.25);
            color: #ffffff;
        }

        .input-group-text-glass {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            color: #94a3b8;
            background: none;
            border: none;
            padding: 0;
        }

        .btn-gradient {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px -3px rgba(79, 70, 229, 0.4);
            transition: all 0.3s ease;
        }

        .btn-gradient:hover {
            opacity: 0.95;
            transform: translateY(-1px);
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.5);
            color: #ffffff;
        }

        .brand-logo {
            font-size: 2.25rem;
            font-weight: 800;
            background: linear-gradient(135deg, #06b6d4 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 8px;
        }

        a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
        }

        a:hover {
            color: #60a5fa;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="recovery-card">
    <div class="brand-logo"><i class="bi bi-shield-lock-fill me-2"></i>Recover Account</div>
    <p class="text-center text-secondary mb-4">Reset your account password easily</p>

    <!-- Success Message -->
    <div th:if="${successMessage}" class="alert alert-success border-0 bg-success bg-opacity-10 text-success rounded-3" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${successMessage}"></span>
    </div>

    <form th:action="@{/forgot-password}" method="post">
        <div class="mb-4 position-relative">
            <span class="input-group-text-glass"><i class="bi bi-envelope-fill"></i></span>
            <input type="email" name="email" class="form-control form-control-glass w-100" placeholder="Enter your registered email" required autofocus>
        </div>

        <button type="submit" class="btn btn-gradient w-100 mb-3">Send Recovery Details</button>
    </form>

    <div class="text-center text-secondary mt-2" style="font-size: 0.9rem;">
        Remembered your password? <a th:href="@{/login}">Sign In</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
