<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Smart Online Fuel Delivery</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #090d16 0%, #111827 50%, #4f46e5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            margin: 0;
            color: #ffffff;
            padding: 40px 10px;
        }

        .register-card {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.6s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-control-glass, .form-select-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 16px;
            color: #ffffff;
            transition: all 0.3s ease;
        }

        .form-control-glass:focus, .form-select-glass:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.25);
            color: #ffffff;
        }

        /* Styling for select dropdown option elements in dark background browsers */
        .form-select-glass option {
            background: #111827;
            color: #ffffff;
        }

        .btn-gradient {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px -3px rgba(79, 70, 229, 0.4);
            transition: all 0.3s ease;
        }

        .btn-gradient:hover {
            opacity: 0.95;
            transform: translateY(-1px);
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.5);
            color: #ffffff;
        }

        .brand-logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #06b6d4 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 8px;
        }

        .agent-fields-container {
            display: none;
            border-left: 2px solid #7c3aed;
            padding-left: 15px;
            margin-bottom: 20px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
        }

        a:hover {
            color: #60a5fa;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="register-card">
    <div class="brand-logo"><i class="bi bi-fuel-pump-fill me-2"></i>Create Account</div>
    <p class="text-center text-secondary mb-4">Join our smart fuel logistics ecosystem</p>

    <!-- Error Messages -->
    <div th:if="${errorMessage}" class="alert alert-danger border-0 bg-danger bg-opacity-10 text-danger rounded-3" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${errorMessage}"></span>
    </div>

    <form th:action="@{/register}" th:object="${registrationDto}" method="post">
        
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label text-secondary" style="font-size: 0.85rem;">Username</label>
                <input type="text" th:field="*{username}" class="form-control form-control-glass" placeholder="johndoe" required>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label text-secondary" style="font-size: 0.85rem;">Email Address</label>
                <input type="email" th:field="*{email}" class="form-control form-control-glass" placeholder="john@example.com" required>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label text-secondary" style="font-size: 0.85rem;">Password</label>
                <input type="password" th:field="*{password}" class="form-control form-control-glass" placeholder="••••••••" required>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label text-secondary" style="font-size: 0.85rem;">Full Name</label>
                <input type="text" th:field="*{fullName}" class="form-control form-control-glass" placeholder="John Doe" required>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label text-secondary" style="font-size: 0.85rem;">Phone Number</label>
                <input type="text" th:field="*{phoneNumber}" class="form-control form-control-glass" placeholder="+1234567890">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label text-secondary" style="font-size: 0.85rem;">Select Role</label>
                <select id="role-select" th:field="*{role}" class="form-select form-select-glass" required>
                    <option value="CUSTOMER">Customer</option>
                    <option value="PROVIDER">Fuel Provider</option>
                    <option value="AGENT">Delivery Agent</option>
                    <option value="ADMIN">Admin</option>
                </select>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label text-secondary" style="font-size: 0.85rem;">Address / Base Location</label>
            <input type="text" th:field="*{address}" class="form-control form-control-glass" placeholder="123 Main St, New York" required>
        </div>

        <!-- Conditional Delivery Agent Fields -->
        <div id="agent-fields" class="agent-fields-container">
            <h6 class="text-primary mb-3"><i class="bi bi-truck me-2"></i>Delivery Agent Profile Details</h6>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label text-secondary" style="font-size: 0.85rem;">Vehicle Number</label>
                    <input type="text" th:field="*{vehicleNumber}" class="form-control form-control-glass" placeholder="NY-987-AB">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label text-secondary" style="font-size: 0.85rem;">Vehicle Type</label>
                    <input type="text" th:field="*{vehicleType}" class="form-control form-control-glass" placeholder="E-Truck / Mini-Tanker">
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-gradient w-100 mb-3 mt-2">Create Account</button>
    </form>

    <div class="text-center text-secondary" style="font-size: 0.9rem;">
        Already have an account? <a th:href="@{/login}">Sign In</a>
    </div>
</div>

<script>
    const roleSelect = document.getElementById('role-select');
    const agentFields = document.getElementById('agent-fields');

    function toggleAgentFields() {
        if (roleSelect.value === 'AGENT') {
            agentFields.style.display = 'block';
        } else {
            agentFields.style.display = 'none';
        }
    }

    roleSelect.addEventListener('change', toggleAgentFields);
    // Init state on page load
    toggleAgentFields();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
