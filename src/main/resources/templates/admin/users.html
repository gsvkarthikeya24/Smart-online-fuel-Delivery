<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{layout/main :: header('User Management')}"></head>
<body>

<div class="app-container">
    <!-- Sidebar -->
    <div th:replace="~{layout/main :: sidebar('users')}"></div>

    <div class="main-wrapper">
        <!-- Top Navbar -->
        <div th:replace="~{layout/main :: navbar('User Administration')}"></div>

        <!-- Main Content -->
        <div class="container-fluid p-4 animate-fade-in">
            <div class="glass-card">
                <h5 class="fw-bold mb-4"><i class="bi bi-people-fill me-2 text-primary"></i>System Registered Users</h5>

                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th>User ID</th>
                                <th>Name / Username</th>
                                <th>Email Address</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Registration Date</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="user : ${users}">
                                <td th:text="'#' + ${user.id}">#1</td>
                                <td>
                                    <strong th:text="${user.fullName}">John Doe</strong>
                                    <span class="d-block text-xs text-muted" th:text="${user.username}">johndoe</span>
                                </td>
                                <td th:text="${user.email}">john@example.com</td>
                                <td>
                                    <!-- Display Badge based on role -->
                                    <span class="badge" 
                                          th:classappend="${user.role.name == 'ROLE_ADMIN' ? 'bg-danger' : 
                                                           (user.role.name == 'ROLE_CUSTOMER' ? 'bg-primary' : 
                                                           (user.role.name == 'ROLE_PROVIDER' ? 'bg-warning text-dark' : 'bg-info text-dark'))}"
                                          th:text="${#strings.replace(user.role.name, 'ROLE_', '')}">
                                        CUSTOMER
                                    </span>
                                </td>
                                <td>
                                    <span th:if="${user.active}" class="badge bg-success p-2">ACTIVE</span>
                                    <span th:if="${!user.active}" class="badge bg-secondary p-2">INACTIVE</span>
                                </td>
                                <td th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm')}">2026-06-10</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{layout/main :: footer}"></div>
</body>
</html>
