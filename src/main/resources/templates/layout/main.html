<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head th:fragment="header(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - Smart Fuel Delivery'"></title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Leaflet Map CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css" />
    <!-- Custom Style -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- Sidebar Fragment -->
<div th:fragment="sidebar(activeItem)" class="sidebar">
    <div class="sidebar-brand">
        <i class="bi bi-fuel-pump-fill"></i>
        <span>SmartFuel AI</span>
    </div>
    <ul class="sidebar-menu">
        <!-- ADMIN LINKS -->
        <li sec:authorize="hasAuthority('ROLE_ADMIN')" th:classappend="${activeItem == 'dashboard' ? 'active' : ''}">
            <a th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a>
        </li>
        <li sec:authorize="hasAuthority('ROLE_ADMIN')" th:classappend="${activeItem == 'users' ? 'active' : ''}">
            <a th:href="@{/admin/users}"><i class="bi bi-people-fill"></i> Users Control</a>
        </li>
        <li sec:authorize="hasAuthority('ROLE_ADMIN')" th:classappend="${activeItem == 'orders' ? 'active' : ''}">
            <a th:href="@{/admin/orders}"><i class="bi bi-cart-fill"></i> System Orders</a>
        </li>
        <li sec:authorize="hasAuthority('ROLE_ADMIN')" th:classappend="${activeItem == 'predictions' ? 'active' : ''}">
            <a th:href="@{/admin/predictions}"><i class="bi bi-cpu-fill"></i> AI Predictions</a>
        </li>
        <li sec:authorize="hasAuthority('ROLE_ADMIN')" th:classappend="${activeItem == 'logs' ? 'active' : ''}">
            <a th:href="@{/admin/logs}"><i class="bi bi-journal-text"></i> Audit Logs</a>
        </li>

        <!-- CUSTOMER LINKS -->
        <li sec:authorize="hasAuthority('ROLE_CUSTOMER')" th:classappend="${activeItem == 'dashboard' ? 'active' : ''}">
            <a th:href="@{/customer/dashboard}"><i class="bi bi-house-door-fill"></i> Dashboard</a>
        </li>
        <li sec:authorize="hasAuthority('ROLE_CUSTOMER')" th:classappend="${activeItem == 'order-fuel' ? 'active' : ''}">
            <a th:href="@{/customer/order-fuel}"><i class="bi bi-bag-plus-fill"></i> Book Fuel</a>
        </li>
        <li sec:authorize="hasAuthority('ROLE_CUSTOMER')" th:classappend="${activeItem == 'history' ? 'active' : ''}">
            <a th:href="@{/customer/history}"><i class="bi bi-clock-history"></i> Order History</a>
        </li>
        <li sec:authorize="hasAuthority('ROLE_CUSTOMER')" th:classappend="${activeItem == 'profile' ? 'active' : ''}">
            <a th:href="@{/customer/profile}"><i class="bi bi-person-fill-gear"></i> Settings</a>
        </li>

        <!-- PROVIDER LINKS -->
        <li sec:authorize="hasAuthority('ROLE_PROVIDER')" th:classappend="${activeItem == 'dashboard' ? 'active' : ''}">
            <a th:href="@{/provider/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a>
        </li>
        <li sec:authorize="hasAuthority('ROLE_PROVIDER')" th:classappend="${activeItem == 'inventory' ? 'active' : ''}">
            <a th:href="@{/provider/inventory}"><i class="bi bi-clipboard-data-fill"></i> Stock Controls</a>
        </li>
        <li sec:authorize="hasAuthority('ROLE_PROVIDER')" th:classappend="${activeItem == 'prices' ? 'active' : ''}">
            <a th:href="@{/provider/prices}"><i class="bi bi-currency-dollar"></i> Price History</a>
        </li>
        <li sec:authorize="hasAuthority('ROLE_PROVIDER')" th:classappend="${activeItem == 'orders' ? 'active' : ''}">
            <a th:href="@{/provider/orders}"><i class="bi bi-truck-flatbed"></i> Operations</a>
        </li>

        <!-- DELIVERY AGENT LINKS -->
        <li sec:authorize="hasAuthority('ROLE_AGENT')" th:classappend="${activeItem == 'dashboard' ? 'active' : ''}">
            <a th:href="@{/agent/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a>
        </li>
        <li sec:authorize="hasAuthority('ROLE_AGENT')" th:classappend="${activeItem == 'orders' ? 'active' : ''}">
            <a th:href="@{/agent/orders}"><i class="bi bi-truck"></i> Jobs Queue</a>
        </li>
    </ul>
    <div class="sidebar-footer">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-outline-danger w-100 btn-sm">
                <i class="bi bi-box-arrow-right"></i> Logout
            </button>
        </form>
    </div>
</div>

<!-- Top Navbar Fragment -->
<div th:fragment="navbar(pageTitle)" class="navbar-top px-4 d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center gap-3">
        <button class="btn btn-link d-lg-none p-0 text-dark" id="sidebar-collapse">
            <i class="bi bi-list fs-3"></i>
        </button>
        <h4 class="mb-0 fw-bold" th:text="${pageTitle}">Page Title</h4>
    </div>
    
    <div class="d-flex align-items-center gap-4">
        <!-- Toast Notification Center Trigger -->
        <span class="theme-switch" id="theme-toggle" title="Toggle Theme">
            <i class="bi bi-moon-stars-fill"></i>
        </span>
        
        <!-- User Details Panel -->
        <div class="d-flex align-items-center gap-2">
            <div class="text-end d-none d-sm-block">
                <div class="fw-semibold text-sm" sec:authentication="name">Username</div>
                <div class="text-xs text-muted" style="font-size: 0.75rem;" sec:authentication="principal.authorities[0].authority">Role</div>
            </div>
            <div class="avatar bg-primary-gradient text-white rounded-circle d-flex align-items-center justify-content-center" 
                 style="width: 40px; height: 40px; font-weight: 600;">
                 <i class="bi bi-person-fill fs-5"></i>
            </div>
        </div>
    </div>
</div>

<!-- Footer/Scripts Fragment -->
<div th:fragment="footer" class="footer-scripts">
    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script th:src="@{/js/main.js}"></script>
</div>

</body>
</html>
