<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{layout/main :: header('Fuel Prices')}"></head>
<body>

<div class="app-container">
    <!-- Sidebar -->
    <div th:replace="~{layout/main :: sidebar('prices')}"></div>

    <div class="main-wrapper">
        <!-- Top Navbar -->
        <div th:replace="~{layout/main :: navbar('Fuel Price Controls')}"></div>

        <!-- Main Content -->
        <div class="container-fluid p-4 animate-fade-in">
            <div class="row g-4">
                
                <!-- Current Prices List -->
                <div class="col-lg-7">
                    <div class="glass-card h-100">
                        <h5 class="fw-bold mb-4">Market Fuel Rates</h5>
                        <div class="table-responsive">
                            <table class="table align-middle table-hover">
                                <thead>
                                    <tr>
                                        <th>Fuel Type</th>
                                        <th>Description</th>
                                        <th>Base Price Per Liter</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="fuel : ${fuels}">
                                        <td class="fw-semibold text-primary" th:text="${fuel.name}">Petrol</td>
                                        <td class="text-muted" th:text="${fuel.description}">High octane base petrol</td>
                                        <td class="fw-bold text-success" th:text="'₹' + ${#numbers.formatDecimal(fuel.basePricePerLiter, 1, 2)}">₹1.20</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Update Price Form -->
                <div class="col-lg-5">
                    <div class="glass-card">
                        <h5 class="fw-bold mb-4">Modify Fuel Rate</h5>
                        
                        <div th:if="${param.success}" class="alert alert-success border-0 bg-success bg-opacity-10 text-success rounded-3 mb-4" role="alert">
                            <i class="bi bi-check-circle-fill me-2"></i> Price adjusted and logs added to historical repository.
                        </div>

                        <form th:action="@{/provider/prices}" method="post">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Select Fuel Type</label>
                                <select name="fuelTypeId" class="form-select form-glass" required>
                                    <option value="" disabled selected>-- Select Fuel --</option>
                                    <option th:each="fuel : ${fuels}" th:value="${fuel.id}" th:text="${fuel.name}"></option>
                                </select>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-semibold">New Base Price per Liter (₹)</label>
                                <input type="number" step="0.01" name="newPrice" class="form-control form-glass" placeholder="e.g. 100.00" min="0.01" required>
                            </div>

                            <button type="submit" class="btn btn-primary-gradient w-100"><i class="bi bi-currency-exchange me-2"></i>Apply Pricing Updates</button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<div th:replace="~{layout/main :: footer}"></div>
</body>
</html>
